name: Daily Event Checker

on:
  schedule:
    # Runs at 00:00 UTC (09:00 AM KST) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run event crawler validation
        run: node crawler.js

      - name: Commit and push updated data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Commit only if there are actual modifications to data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update attendance event list [skip ci]" && git push)
